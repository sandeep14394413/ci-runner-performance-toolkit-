name: Test Windows Runner

on:
  workflow_dispatch:

jobs:
  test:
    runs-on:
      - self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Print Hello
        run: echo Hello from my Windows Self Hosted Runner

      - name: Show Current Directory
        run: pwd

      - name: Show Git Version
        run: git --version

      - name: Show Python Version
        run: python --version
