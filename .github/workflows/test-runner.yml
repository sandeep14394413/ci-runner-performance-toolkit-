name: Runner Diagnostics

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Who am I
        shell: cmd
        run: whoami

      - name: Current Directory
        shell: cmd
        run: cd

      - name: List Repository Files
        shell: cmd
        run: dir
