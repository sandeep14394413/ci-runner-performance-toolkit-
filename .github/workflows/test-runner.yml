name: Runner Diagnostics

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on:
      - self-hosted

    steps:
      - name: Who am I
        shell: cmd
        run: whoami

      - name: Username
        shell: cmd
        run: echo %USERNAME%

      - name: User Profile
        shell: cmd
        run: echo %USERPROFILE%

      - name: PATH
        shell: cmd
        run: echo %PATH%

      - name: List Python Folder
        shell: cmd
        run: dir "C:\Users\abcom\AppData\Local\Programs\Python\Python313"

      - name: Check Python EXE
        shell: cmd
        run: if exist "C:\Users\abcom\AppData\Local\Programs\Python\Python313\python.exe" (echo FOUND) else (echo NOT FOUND)
