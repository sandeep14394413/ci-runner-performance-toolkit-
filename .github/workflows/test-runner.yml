# ============================================================
# Test Windows Self Hosted Runner
# ============================================================
# Purpose:
#   Verify the Windows self-hosted runner is working correctly.
#
# Checks:
#   - Repository checkout
#   - PowerShell 7 (pwsh)
#   - Git installation
#   - Python installation
#   - Current working directory
#
# Trigger:
#   Manual (workflow_dispatch)
# ============================================================

name: Test Windows Self Hosted Runner

on:
  workflow_dispatch:

jobs:
  runner-test:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Print Welcome Message
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "======================================="
          Write-Host " Windows Self Hosted Runner Test"
          Write-Host "======================================="
          Write-Host ""

      - name: Show Runner Information
        shell: pwsh
        run: |
          Write-Host "Runner Name : $env:RUNNER_NAME"
          Write-Host "OS          : $env:RUNNER_OS"
          Write-Host "Architecture: $env:RUNNER_ARCH"
          Write-Host "Workspace   : $env:GITHUB_WORKSPACE"

      - name: Show Current Directory
        shell: pwsh
        run: |
          Get-Location

      - name: Show Git Version
        shell: pwsh
        run: |
          git --version

      - name: Show Python Version
        shell: pwsh
        run: |
          python --version
          pip --version

      - name: Display PATH
        shell: pwsh
        run: |
          $env:PATH -split ';'

      - name: Verify Python Location
        shell: pwsh
        run: |
          Get-Command python -ErrorAction SilentlyContinue

      - name: Runner Test Completed
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "======================================="
          Write-Host " Runner verification completed!"
          Write-Host "======================================="
