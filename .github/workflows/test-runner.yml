name: Test Windows Runner

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Verify Python
        shell: cmd
        run: python --version

      - name: Verify Pip
        shell: cmd
        run: pip --version

      - name: Verify Git
        shell: cmd
        run: git --version

      - name: Hello
        shell: cmd
        run: echo Runner is working successfully!
